<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPDB Audit Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (via CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (To compile JSX in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- SheetJS (For reading Excel files directly) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- Authentication Mock ---
        const users = {
          'admin': { role: 'central', zone: 'all', name: 'Central Admin (Director)' },
          'dhaka': { role: 'zone', zone: 'ঢাকা', name: 'Dhaka Zone Admin' },
          'ctg': { role: 'zone', zone: 'চট্টগ্রাম', name: 'Chittagong Zone Admin' },
          'mymensingh': { role: 'zone', zone: 'ময়মনসিংহ', name: 'Mymensingh Zone Admin' },
          'comilla': { role: 'zone', zone: 'কুমিল্লা', name: 'Comilla Zone Admin' },
          'sylhet': { role: 'zone', zone: 'সিলেট', name: 'Sylhet Zone Admin' },
          'fapad': { role: 'zone', zone: 'ফাপাড', name: 'FAPAD Admin' },
        };

        // --- Smart Category Filler Logic ---
        const assignCategory = (title, currentCategory) => {
          if (currentCategory && currentCategory.trim() !== '') return currentCategory.trim();
          const t = title.toLowerCase();
          if (t.includes('বকেয়া') || t.includes('অনাদায়') || t.includes('বিল')) return 'বকেয়া সংক্রান্ত';
          if (t.includes('ক্রয়') || t.includes('দরপত্র') || t.includes('টেন্ডার') || t.includes('প্যাকেজ') || t.includes('মালামাল') || t.includes('স্টোর')) return 'টেন্ডার ও ক্রয়';
          if (t.includes('ভ্যাট') || t.includes('আয়কর') || t.includes('কর') || t.includes('উৎস কর')) return 'ভ্যাট ও আয়কর';
          if (t.includes('অতিরিক্ত') || t.includes('অপচয়') || t.includes('ক্ষতি') || t.includes('আত্মসাৎ')) return 'আর্থিক ক্ষতি/অতিরিক্ত ব্যয়';
          if (t.includes('ভাতা') || t.includes('বেতন') || t.includes('টিএ') || t.includes('ডিএ') || t.includes('পেনশন') || t.includes('বোনাস')) return 'বেতন ও ভাতা';
          if (t.includes('বিধি') || t.includes('অনিয়মিত') || t.includes('অনুমোদন')) return 'আর্থিক বিধি লঙ্ঘন';
          if (t.includes('মিটার') || t.includes('সংযোগ') || t.includes('লাইন')) return 'মিটার ও সংযোগ';
          return 'বিবিধ (Miscellaneous)';
        };

        function App() {
          const [currentUser, setCurrentUser] = useState(null);
          const [loginInput, setLoginInput] = useState({ username: '', password: '' });
          const [loginError, setLoginError] = useState('');

          const [objections, setObjections] = useState([]);
          const [loading, setLoading] = useState(false);
          const [autoSyncStatus, setAutoSyncStatus] = useState('');

          // Filters State
          const [filterZone, setFilterZone] = useState('All');
          const [filterType, setFilterType] = useState('All');
          const [filterYear, setFilterYear] = useState('All');
          const [filterCategory, setFilterCategory] = useState('All');
          const [filterOffice, setFilterOffice] = useState('All'); // New state for Specific Office Selection
          
          // View Mode State
          const [viewMode, setViewMode] = useState('summary'); // 'summary' or 'details' or 'none'

          const fileInputRef = useRef(null);

          // Clear Office filter automatically when other main filters change
          useEffect(() => {
              setFilterOffice('All');
          }, [filterZone, filterType, filterYear, filterCategory]);

          // Reusable Excel Data processing logic
          const processExcelData = (rows, isAutoLoad = false) => {
            const existingData = JSON.parse(localStorage.getItem('bpdb_audit_db') || '[]');
            const resolvedIds = new Set(existingData.filter(o => o.status === 'Resolved').map(o => o.id));

            // Assuming the first row is headers, we start from index 1
            const parsedData = rows.slice(1).map((row, index) => {
              if(!row || row.length < 5) return null;
              
              // Safely convert everything to string to avoid errors with empty cells or numbers
              const office = (row[1] || 'Unknown').toString().trim();
              const year = (row[2] || 'Unknown').toString().trim();
              const para = (row[3] || 'Unknown').toString().trim();
              const title = (row[4] || '').toString().trim();
              const amountStr = (row[5] || '0').toString().replace(/,/g, '');
              const typeStr = (row[7] || '').toString();
              const rawCategory = (row[8] || '').toString().trim();
              const zoneStr = (row[9] || 'অন্যান্য').toString().trim();
              
              const stableId = `OBJ-${office}-${year}-${para}-${index}`.replace(/\s+/g, '-');

              return {
                id: stableId,
                office: office,
                year: year,
                para: para,
                title: title,
                amount: parseFloat(amountStr) || 0,
                type: typeStr.includes('এসএফআই') || typeStr.includes('SFI') ? (typeStr.includes('নন') || typeStr.toLowerCase().includes('non') ? 'Non-SFI' : 'SFI') : 'SFI',
                category: assignCategory(title, rawCategory),
                zone: zoneStr,
                status: resolvedIds.has(stableId) ? 'Resolved' : 'Active'
              };
            }).filter(Boolean);

            setObjections(parsedData);
            localStorage.setItem('bpdb_audit_db', JSON.stringify(parsedData));
            
            if(!isAutoLoad) {
               alert('সফলভাবে এক্সেল ফাইল থেকে ডাটাবেস আপডেট হয়েছে!');
            }
          };

          // On Load Component
          useEffect(() => {
            const savedData = localStorage.getItem('bpdb_audit_db');
            if (savedData) {
              setObjections(JSON.parse(savedData));
            }

            // Auto Load Excel File
            const attemptAutoLoad = async () => {
              try {
                setAutoSyncStatus('Checking for Excel file...');
                const response = await fetch('./All (Office Wise).xlsx'); 
                if (response.ok) {
                  const arrayBuffer = await response.arrayBuffer();
                  const data = new Uint8Array(arrayBuffer);
                  const workbook = XLSX.read(data, {type: 'array'});
                  const firstSheetName = workbook.SheetNames[0];
                  const worksheet = workbook.Sheets[firstSheetName];
                  const jsonRows = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                  
                  processExcelData(jsonRows, true);
                  setAutoSyncStatus('Auto-synced with Excel file!');
                  setTimeout(() => setAutoSyncStatus(''), 3000);
                } else {
                  setAutoSyncStatus('');
                }
              } catch (error) {
                console.log("Auto-fetch skipped (Likely due to browser local file security or file missing).");
                setAutoSyncStatus('');
              }
            };

            attemptAutoLoad();
          }, []);

          const handleLogin = (e) => {
            e.preventDefault();
            const user = users[loginInput.username.toLowerCase()];
            if (user && loginInput.password === '1234') { 
              setCurrentUser(user);
              setFilterZone(user.role === 'central' ? 'All' : user.zone);
              setLoginError('');
            } else {
              setLoginError('ভুল ইউজারনেম বা পাসওয়ার্ড! (ডেমো পাসওয়ার্ড: 1234)');
            }
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setLoading(true);

            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonRows = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                
                processExcelData(jsonRows, false);
              } catch(error) {
                alert("এক্সেল ফাইল রিড করতে সমস্যা হয়েছে! সঠিক ফাইল নির্বাচন করেছেন কিনা চেক করুন।");
              }
              setLoading(false);
            };
            reader.readAsArrayBuffer(file);
          };

          const resolveObjection = (id) => {
            if(window.confirm('আপনি কি নিশ্চিত যে এই আপত্তিটি নিস্পত্তি হয়েছে?')) {
              const updated = objections.map(obj => obj.id === id ? { ...obj, status: 'Resolved' } : obj);
              setObjections(updated);
              localStorage.setItem('bpdb_audit_db', JSON.stringify(updated));
            }
          };

          // --- Filtering Logic ---
          // 1. Data filtered by General Filters (Zone, Year, Category, Type) - Used for Summary
          const preOfficeFilteredData = useMemo(() => {
            return objections.filter(obj => {
              const matchZone = filterZone === 'All' ? true : obj.zone.includes(filterZone);
              const matchType = filterType === 'All' ? true : obj.type === filterType;
              const matchYear = filterYear === 'All' ? true : obj.year === filterYear;
              const matchCategory = filterCategory === 'All' ? true : obj.category === filterCategory;
              const isActive = obj.status === 'Active';
              return matchZone && matchType && matchYear && matchCategory && isActive;
            });
          }, [objections, filterZone, filterType, filterYear, filterCategory]);

          // 2. Data filtered by all filters INCLUDING Office - Used for Details Table and Top Cards
          const filteredData = useMemo(() => {
              return preOfficeFilteredData.filter(obj => filterOffice === 'All' ? true : obj.office === filterOffice);
          }, [preOfficeFilteredData, filterOffice]);


          // --- Summary Generation Logic ---
          const summaryData = useMemo(() => {
              const summary = {};
              preOfficeFilteredData.forEach(obj => {
                  if (!summary[obj.office]) {
                      summary[obj.office] = { office: obj.office, zone: obj.zone, sfi: 0, nonSfi: 0, total: 0 };
                  }
                  if (obj.type === 'SFI') summary[obj.office].sfi++;
                  else summary[obj.office].nonSfi++;
                  
                  summary[obj.office].total++;
              });
              // Return as array sorted by total objections (highest first)
              return Object.values(summary).sort((a, b) => b.total - a.total);
          }, [preOfficeFilteredData]);

          // Metrics based on Final Filtered Data
          const resolvedCount = objections.filter(o => o.status === 'Resolved' && (filterZone === 'All' ? true : o.zone.includes(filterZone))).length;
          const uniqueYears = [...new Set(objections.map(o => o.year))].filter(Boolean).sort();
          const uniqueCategories = [...new Set(objections.map(o => o.category))].filter(Boolean).sort();

          // --- Login Screen ---
          if (!currentUser) {
            return (
              <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border-t-4 border-blue-600">
                  <div className="text-center mb-8">
                    <i className="fas fa-shield-alt text-5xl text-blue-600 mb-3"></i>
                    <h1 className="text-2xl font-bold text-gray-800">BPDB Audit Database</h1>
                    <p className="text-gray-500 mt-2 text-sm">Central Admin & Zone Access Portal</p>
                  </div>
                  
                  <form onSubmit={handleLogin} className="space-y-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">ইউজারনেম (e.g., admin, dhaka, ctg)</label>
                      <input type="text" required
                        className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                        value={loginInput.username} onChange={e => setLoginInput({ ...loginInput, username: e.target.value })}
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">পাসওয়ার্ড</label>
                      <input type="password" required
                        className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                        value={loginInput.password} onChange={e => setLoginInput({ ...loginInput, password: e.target.value })}
                      />
                    </div>
                    {loginError && <p className="text-red-500 text-sm">{loginError}</p>}
                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-colors">
                      লগইন করুন
                    </button>
                  </form>
                </div>
              </div>
            );
          }

          // --- Dashboard View ---
          return (
            <div className="min-h-screen bg-gray-100 font-sans pb-10">
              <nav className="bg-blue-800 text-white shadow-md px-6 py-4 flex justify-between items-center sticky top-0 z-20">
                <div className="flex items-center gap-3">
                  <i className="fas fa-database text-2xl text-yellow-400"></i>
                  <h1 className="text-xl font-bold hidden sm:block">Uniform Audit Database - BPDB</h1>
                </div>
                <div className="flex items-center gap-4">
                  <div className="flex items-center gap-2 bg-blue-700 px-3 py-1.5 rounded-full text-sm">
                    <i className="fas fa-user"></i>
                    <span>{currentUser.name}</span>
                  </div>
                  <button onClick={() => setCurrentUser(null)} className="hover:text-red-300 transition-colors" title="লগআউট">
                    <i className="fas fa-sign-out-alt text-xl"></i>
                  </button>
                </div>
              </nav>

              <div className="max-w-7xl mx-auto p-4 sm:p-6 space-y-6">
                
                {/* File Upload UI */}
                {currentUser.role === 'central' && (
                  <div className="bg-white p-4 rounded-lg shadow border border-gray-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                    <div>
                      <h3 className="font-bold text-gray-800 flex items-center gap-2">
                        <i className="fas fa-sync-alt text-blue-600"></i> Database Sync / Upload
                      </h3>
                      <p className="text-sm text-gray-500">
                        "All (Office Wise).xlsx" ফোল্ডারে থাকলে অটোমেটিক লোড হবে। {autoSyncStatus && <span className="text-green-600 font-bold">({autoSyncStatus})</span>}
                      </p>
                    </div>
                    <div className="relative">
                      <input type="file" accept=".xlsx, .xls" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                      <button 
                        onClick={() => fileInputRef.current.click()}
                        disabled={loading}
                        className="bg-green-700 hover:bg-green-800 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition-colors text-sm"
                      >
                        <i className="fas fa-file-excel"></i> {loading ? 'আপলোড হচ্ছে...' : 'ম্যানুয়ালি Excel আপলোড'}
                      </button>
                    </div>
                  </div>
                )}

                {/* Main Filters UI */}
                <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 space-y-5">
                  <div className="flex items-center gap-2 border-b pb-3 text-gray-700">
                    <i className="fas fa-filter text-blue-600"></i>
                    <h2 className="text-lg font-bold">ড্যাশবোর্ড ফিল্টার</h2>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div className="space-y-4">
                      <div>
                        <label className="text-sm font-bold text-gray-600 mb-2 block">আপত্তির ধরন (Type):</label>
                        <div className="flex flex-wrap gap-2">
                          {['All', 'SFI', 'Non-SFI'].map(type => (
                            <button key={type} onClick={() => setFilterType(type)}
                              className={`px-4 py-1.5 rounded-full text-sm font-medium transition-all ${filterType === type ? 'bg-blue-600 text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                            >
                              {type === 'All' ? 'সকল আপত্তি' : type}
                            </button>
                          ))}
                        </div>
                      </div>

                      <div>
                        <label className="text-sm font-bold text-gray-600 mb-2 block">জোন নির্বাচন (Zone):</label>
                        <div className="flex flex-wrap gap-2">
                          {['All', 'ঢাকা', 'চট্টগ্রাম', 'ময়মনসিংহ', 'কুমিল্লা', 'সিলেট', 'ফাপাড'].map(zone => {
                            const isDisabled = currentUser.role !== 'central' && !zone.includes(currentUser.zone) && zone !== 'All';
                            if (currentUser.role !== 'central' && zone === 'All') return null; 

                            return (
                              <button key={zone} 
                                onClick={() => setFilterZone(zone)}
                                disabled={isDisabled}
                                className={`px-3 py-1.5 rounded text-sm font-medium transition-all ${filterZone === zone ? 'bg-indigo-600 text-white shadow' : isDisabled ? 'bg-gray-50 text-gray-300 cursor-not-allowed border' : 'bg-gray-100 text-gray-700 hover:bg-gray-200 border'}`}
                              >
                                {zone === 'All' ? 'সকল জোন' : zone}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    </div>

                    <div className="space-y-4">
                       <div>
                        <label className="text-sm font-bold text-gray-600 mb-2 block flex items-center gap-1"><i className="fas fa-calendar-alt"></i> নিরীক্ষা বছর:</label>
                        <select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5">
                          <option value="All">সকল বছর</option>
                          {uniqueYears.map(year => <option key={year} value={year}>{year}</option>)}
                        </select>
                      </div>

                      <div>
                        <label className="text-sm font-bold text-gray-600 mb-2 block flex items-center gap-1"><i className="fas fa-list"></i> আপত্তির ক্যাটাগরি:</label>
                        <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)} className="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5">
                          <option value="All">সকল ক্যাটাগরি</option>
                          {uniqueCategories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                        </select>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Metrics Cards */}
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500 flex flex-col justify-center relative overflow-hidden">
                    <p className="text-gray-500 text-sm font-semibold">বর্তমান ফিল্টারে আপত্তি</p>
                    <p className="text-3xl font-bold text-gray-800 z-10">{filteredData.length}</p>
                    <i className="fas fa-file-invoice absolute -bottom-2 -right-2 text-6xl text-blue-50 z-0"></i>
                  </div>
                  <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500 flex flex-col justify-center relative overflow-hidden">
                    <p className="text-gray-500 text-sm font-semibold">মোট SFI (ফিল্টারকৃত)</p>
                    <p className="text-3xl font-bold text-gray-800 z-10">{filteredData.filter(d => d.type === 'SFI').length}</p>
                    <i className="fas fa-exclamation-triangle absolute -bottom-2 -right-2 text-6xl text-red-50 z-0"></i>
                  </div>
                  <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-500 flex flex-col justify-center relative overflow-hidden">
                    <p className="text-gray-500 text-sm font-semibold">মোট Non-SFI (ফিল্টারকৃত)</p>
                    <p className="text-3xl font-bold text-gray-800 z-10">{filteredData.filter(d => d.type === 'Non-SFI').length}</p>
                    <i className="fas fa-info-circle absolute -bottom-2 -right-2 text-6xl text-yellow-50 z-0"></i>
                  </div>
                  <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500 flex flex-col justify-center relative overflow-hidden">
                    <p className="text-gray-500 text-sm font-semibold">নিস্পন্ন আপত্তি (আপনার জোনে)</p>
                    <p className="text-3xl font-bold text-green-600 flex items-center gap-2 z-10">
                      {resolvedCount} <i className="fas fa-check-circle"></i>
                    </p>
                    <i className="fas fa-check-double absolute -bottom-2 -right-2 text-6xl text-green-50 z-0"></i>
                  </div>
                </div>

                {/* View Toggle Buttons */}
                <div className="flex flex-col sm:flex-row justify-center gap-4 py-2">
                  <button 
                    onClick={() => setViewMode(viewMode === 'summary' ? 'none' : 'summary')}
                    className={`inline-flex items-center justify-center gap-2 font-bold py-3 px-8 rounded-full shadow transition-transform transform hover:scale-105 ${viewMode === 'summary' ? 'bg-blue-700 text-white ring-4 ring-blue-200' : 'bg-white text-blue-700 border-2 border-blue-600 hover:bg-blue-50'}`}
                  >
                    <i className="fas fa-chart-pie"></i> {viewMode === 'summary' ? 'Summary লুকান' : 'Summary দেখুন'}
                  </button>
                  <button 
                    onClick={() => setViewMode(viewMode === 'details' ? 'none' : 'details')}
                    className={`inline-flex items-center justify-center gap-2 font-bold py-3 px-8 rounded-full shadow transition-transform transform hover:scale-105 ${viewMode === 'details' ? 'bg-indigo-700 text-white ring-4 ring-indigo-200' : 'bg-white text-indigo-700 border-2 border-indigo-600 hover:bg-indigo-50'}`}
                  >
                    <i className="fas fa-list-ul"></i> {viewMode === 'details' ? 'Details লুকান' : 'Details দেখুন'}
                  </button>
                </div>

                {/* ---------------- SUMMARY TABLE VIEW ---------------- */}
                {viewMode === 'summary' && (
                  <div className="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden mb-6 animate-fade-in-up">
                    <div className="bg-gradient-to-r from-blue-50 to-indigo-50 px-4 py-3 border-b border-blue-200 flex justify-between items-center">
                      <h3 className="font-bold text-blue-900 flex items-center gap-2"><i className="fas fa-table"></i> দপ্তর ভিত্তিক সামারি (Summary)</h3>
                      <span className="text-xs bg-blue-200 text-blue-800 px-3 py-1.5 rounded-full font-bold">{summaryData.length} টি দপ্তর</span>
                    </div>
                    <div className="overflow-x-auto max-h-[600px] overflow-y-auto">
                      <table className="w-full text-sm text-left">
                        <thead className="text-xs text-gray-700 uppercase bg-gray-100 sticky top-0 z-10 shadow-sm">
                          <tr>
                            <th className="p-3 text-center">ক্রমিক নং</th>
                            <th className="p-3">দপ্তরের নাম (ক্লিক করে বিস্তারিত দেখুন)</th>
                            <th className="p-3 text-center">জোন</th>
                            <th className="p-3 text-center">Non-SFI (সাধারণ)</th>
                            <th className="p-3 text-center">SFI (অগ্রিম)</th>
                            <th className="p-3 text-center">মোট আপত্তি</th>
                          </tr>
                        </thead>
                        <tbody>
                          {summaryData.length === 0 ? (
                            <tr><td colSpan="6" className="text-center p-8 text-gray-500 font-medium">কোনো ডাটা পাওয়া যায়নি। ফিল্টার পরিবর্তন করুন।</td></tr>
                          ) : (
                            summaryData.map((row, index) => (
                              <tr key={index} className="border-b hover:bg-blue-50 transition-colors">
                                <td className="p-3 text-center font-medium text-gray-500">{index + 1}</td>
                                <td 
                                    className="p-3 font-bold text-blue-600 cursor-pointer hover:text-blue-800 hover:underline flex items-center gap-2"
                                    onClick={() => { setFilterOffice(row.office); setViewMode('details'); }}
                                    title="এই দপ্তরের বিস্তারিত আপত্তি দেখতে ক্লিক করুন"
                                >
                                    <i className="fas fa-external-link-alt text-xs opacity-50"></i> {row.office}
                                </td>
                                <td className="p-3 text-center text-gray-600">{row.zone}</td>
                                <td className="p-3 text-center font-bold text-yellow-600">{row.nonSfi}</td>
                                <td className="p-3 text-center font-bold text-red-600">{row.sfi}</td>
                                <td className="p-3 text-center font-extrabold text-gray-800 text-base">{row.total}</td>
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}


                {/* ---------------- DETAILS TABLE VIEW ---------------- */}
                {viewMode === 'details' && (
                  <div className="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden mb-6 animate-fade-in-up">
                    <div className="bg-gradient-to-r from-gray-50 to-gray-100 px-4 py-3 border-b border-gray-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                      <h3 className="font-bold text-gray-700 flex items-center gap-2"><i className="fas fa-file-alt text-indigo-500"></i> বিস্তারিত আপত্তি সমূহ</h3>
                      
                      <div className="flex flex-wrap items-center gap-2">
                        {/* Office Filter Active Chip */}
                        {filterOffice !== 'All' && (
                            <button 
                                onClick={() => { setFilterOffice('All'); setViewMode('summary'); }}
                                className="text-xs bg-purple-100 border border-purple-300 text-purple-800 px-3 py-1.5 rounded-full font-bold flex items-center gap-2 hover:bg-purple-200 hover:text-purple-900 transition-colors shadow-sm"
                                title="দপ্তরের ফিল্টার মুছে ফেলুন"
                            >
                                <span>দপ্তর: {filterOffice}</span>
                                <i className="fas fa-times-circle text-sm"></i>
                            </button>
                        )}
                        <span className="text-xs bg-indigo-100 text-indigo-800 px-3 py-1.5 rounded-full font-bold shadow-sm">{filteredData.length} টি রেকর্ড</span>
                      </div>
                    </div>
                    
                    <div className="overflow-x-auto max-h-[600px] overflow-y-auto">
                      <table className="w-full text-sm text-left">
                        <thead className="text-xs text-gray-700 uppercase bg-gray-100 sticky top-0 z-10 shadow-sm border-b">
                          <tr>
                            <th className="p-3">দপ্তরের নাম</th>
                            <th className="p-3">বছর ও অনু নং</th>
                            <th className="p-3 w-1/3">শিরোনাম ও ক্যাটাগরি</th>
                            <th className="p-3 text-center">ধরণ</th>
                            <th className="p-3 text-right">টাকার পরিমান</th>
                            <th className="p-3 text-center">অ্যাকশন</th>
                          </tr>
                        </thead>
                        <tbody>
                          {filteredData.length === 0 ? (
                            <tr><td colSpan="6" className="text-center p-8 text-gray-500 font-medium">কোনো ডাটা পাওয়া যায়নি। ফিল্টার পরিবর্তন করুন।</td></tr>
                          ) : (
                            filteredData.map((item) => (
                              <tr key={item.id} className="border-b hover:bg-gray-50 transition-colors">
                                <td className="p-3 align-top font-bold text-gray-800">
                                    {item.office}
                                    <div className="mt-1"><span className="text-xs bg-gray-200 text-gray-700 px-2 py-0.5 rounded font-normal">জোন: {item.zone}</span></div>
                                </td>
                                <td className="p-3 align-top whitespace-nowrap font-medium">
                                    {item.year}
                                    <div className="text-gray-500 text-xs mt-1">অনু: <span className="font-bold">{item.para}</span></div>
                                </td>
                                <td className="p-3 align-top">
                                  <p className="text-gray-800 leading-relaxed mb-2 font-medium">{item.title}</p>
                                  <span className="inline-flex items-center gap-1 bg-blue-50 text-blue-700 text-xs px-2 py-1 rounded border border-blue-200 font-semibold">
                                    <i className="fas fa-tag"></i> {item.category}
                                  </span>
                                </td>
                                <td className="p-3 align-top text-center">
                                  <span className={`inline-flex items-center px-2 py-1 rounded text-xs font-bold whitespace-nowrap shadow-sm ${
                                    item.type === 'SFI' ? 'bg-red-100 text-red-800 border border-red-300' : 'bg-yellow-100 text-yellow-800 border border-yellow-300'
                                  }`}>
                                    {item.type}
                                  </span>
                                </td>
                                <td className="p-3 align-top text-right font-extrabold text-gray-800 whitespace-nowrap text-base">
                                  ৳ {item.amount.toLocaleString('en-IN')}
                                </td>
                                <td className="p-3 align-top text-center">
                                  <button 
                                    onClick={() => resolveObjection(item.id)}
                                    className="inline-flex items-center gap-1 bg-green-50 hover:bg-green-600 hover:text-white text-green-700 border border-green-300 px-3 py-1.5 rounded text-xs font-bold transition-all shadow-sm"
                                    title="আপত্তিটি নিস্পত্তি হিসেবে মার্ক করুন"
                                  >
                                    <i className="fas fa-check-circle"></i> নিস্পত্তি
                                  </button>
                                </td>
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <!-- Simple Custom CSS for smooth animations -->
    <style>
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
